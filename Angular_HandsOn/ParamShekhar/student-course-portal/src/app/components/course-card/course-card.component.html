<div class="card" [ngClass]="cardClasses" [ngStyle]="{ 'border-left-color': borderColor }" appHighlight>
  <h3>{{ course.name }}</h3>
  <p>{{ course.code }}</p>
  <p>{{ course.credits | creditLabel }}</p>

  <span [ngSwitch]="course.gradeStatus" class="badge">
    <span *ngSwitchCase="'passed'" class="badge--green">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge--red">Failed</span>
    <span *ngSwitchDefault class="badge--grey">Pending</span>
  </span>

  <div *ngIf="isExpanded" class="details">Course ID: {{ course.id }}</div>

  <button (click)="toggleDetails()">Show Details</button>
  <button (click)="onEnrollClick()">{{ isEnrolled ? 'Unenroll' : 'Enroll' }}</button>
</div>
